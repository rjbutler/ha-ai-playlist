# Mood-based playlists for AI Playlist import
#
# Import via: Settings > Integrations > AI Playlist > Configure > Import playlists from YAML

- name: Upbeat & Energetic
  prompt: Generate a playlist of upbeat and energetic songs from artists such as Queen, Journey, Foreigner, Bon Jovi, Huey
    Lewis And The News, The Bangles, Cheap Trick, The Police, Billy Idol, Blondie. Include similar songs and artists that
    fit this style. Choose songs mostly from the late 1970s through early 1990s, but it's OK to have a few from other eras.
  tags:
  - mood
  - rock
  exclude_live: true
- name: Chill & Relaxed
  prompt: Generate a playlist of chill and relaxed songs from artists such as Norah Jones, Jack Johnson, Iron & Wine, Sarah
    McLachlan, Ingrid Michaelson, Sade, Zero 7, José González. Include similar songs and artists that fit this style.
  tags:
  - mood
  - folk
  exclude_live: true
- name: Melancholy & Reflective
  prompt: Generate a playlist of melancholy and reflective songs from artists such as Neil Young, Joni Mitchell, Damien Rice,
    Cat Stevens, Bob Dylan, Radiohead, Nick Drake, Elliott Smith, Jeff Buckley. Include similar songs and artists that fit
    this style. Weight heavily toward the 1960s through 1980s, with some newer selections mixed in.
  tags:
  - mood
  - folk
  - rock
  exclude_live: true
- name: Romantic & Intimate
  prompt: Generate a playlist of romantic and intimate songs from artists such as Paul Simon, James Taylor, Carole King, Diana
    Krall, Madeleine Peyroux, Eva Cassidy, Michael Bublé, Katie Melua. Include similar songs and artists that fit this style.
  tags:
  - mood
  - jazz
  - folk
  exclude_live: true
- name: Optimistic & Feel-Good
  prompt: Generate a playlist of optimistic and feel-good songs from artists such as Hall & Oates, The Beach Boys, The Lovin'
