- name: Classic Rock Foundations
  prompt: Generate a playlist of classic rock songs from artists such as The Beatles, The Rolling Stones, The Kinks, Led Zeppelin,
    The Doors, Jefferson Airplane, Jimi Hendrix, The Byrds, The Animals, Steve Miller Band, The Who, The Zombies, Tom Petty,
    Van Morrison, Warren Zevon, Grand Funk Railroad, Free, Santana, Cream, Crosby Stills & Nash, The Eagles. Include similar
    songs and artists that fit the classic rock foundation style.  
  tags:
  - genre
  - rock
  exclude_live: true
